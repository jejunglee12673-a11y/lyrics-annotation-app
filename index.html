<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歌詞アノテーション</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      height: 160px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: #4a6cf7;
      box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s, background 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-primary { background: #4a6cf7; color: white; }
    .btn-danger  { background: #e74c3c; color: white; }

    .save-notice {
      margin-left: auto;
      font-size: 0.78rem;
      color: #27ae60;
      transition: opacity 0.3s;
    }

    /* annotation rows */
    .annotation-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .row {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fafafa;
    }

    .row-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .line-no {
      font-size: 0.72rem;
      color: #bbb;
      min-width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .lyric {
      font-size: 1rem;
      line-height: 1.6;
      word-break: break-all;
    }

    .lyric.empty-line { color: #ccc; font-style: italic; font-size: 0.85rem; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding-left: 28px;
    }

    .tag {
      padding: 2px 9px;
      font-size: 0.73rem;
      background: #eef2ff;
      color: #4a6cf7;
      border: 1px solid #c7d2fe;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    .tag:hover { background: #c7d2fe; }

    .memo-wrap {
      padding-left: 28px;
    }

    .memo-input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 0.875rem;
      font-family: inherit;
      background: white;
      transition: border-color 0.15s;
    }

    .memo-input:focus {
      outline: none;
      border-color: #4a6cf7;
      box-shadow: 0 0 0 2px rgba(74,108,247,0.1);
    }

    .memo-input::placeholder { color: #ccc; }
  </style>
</head>
<body>

<header>
  <h1>🎵 歌詞アノテーション</h1>
</header>

<main>
  <div class="card">
    <div class="card-title">歌詞を入力</div>
    <textarea id="lyricsInput" placeholder="ここに歌詞を貼り付けてください&#10;（1行ずつ処理されます）"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="parseLyrics()">セット</button>
      <button class="btn-danger" onclick="clearAll()">クリア</button>
      <span class="save-notice" id="saveNotice"></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">アノテーション</div>
    <div class="annotation-list" id="annotationList">
      <div class="empty-state">歌詞を入力して「セット」を押してください</div>
    </div>
  </div>
</main>

<script>
  const STORAGE_KEY = 'lyrics-annotation-v1';
  const TAGS = ['ブレス', 'こぶし', 'しゃくり', 'ハモリ', 'ビブラート', '強調', '弱く', 'タメ'];

  let lines = [];
  let memos = [];

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ lines, memos }));
    const el = document.getElementById('saveNotice');
    el.textContent = '保存済み ✓';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.textContent = ''; }, 2000);
  }

  function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    lines = data.lines || [];
    memos = data.memos || [];
    if (lines.length > 0) {
      document.getElementById('lyricsInput').value = lines.join('\n');
      render();
    }
  }

  function parseLyrics() {
    const text = document.getElementById('lyricsInput').value;
    if (!text.trim()) return;
    const newLines = text.split('\n');
    // 行が一致する場合は既存メモを引き継ぐ
    const newMemos = newLines.map(line => {
      const i = lines.indexOf(line);
      return i !== -1 ? memos[i] : '';
    });
    lines = newLines;
    memos = newMemos;
    render();
    save();
  }

  function clearAll() {
    if (!confirm('すべてのデータを消去しますか？')) return;
    lines = [];
    memos = [];
    document.getElementById('lyricsInput').value = '';
    localStorage.removeItem(STORAGE_KEY);
    render();
  }

  function updateMemo(i, value) {
    memos[i] = value;
    save();
  }

  function insertTag(i, tag) {
    const input = document.getElementById('memo-' + i);
    const sep = input.value ? ' ' : '';
    input.value += sep + tag;
    memos[i] = input.value;
    save();
    input.focus();
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escAttr(str) {
    return str.replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('annotationList');

    if (lines.length === 0) {
      list.innerHTML = '<div class="empty-state">歌詞を入力して「セット」を押してください</div>';
      return;
    }

    list.innerHTML = lines.map((line, i) => {
      const isEmpty = line.trim() === '';
      const lyricHtml = isEmpty
        ? '<span class="lyric empty-line">（空行）</span>'
        : `<span class="lyric">${esc(line)}</span>`;

      const tagBtns = TAGS.map(t =>
        `<button class="tag" onclick="insertTag(${i},'${t}')">${t}</button>`
      ).join('');

      return `
        <div class="row">
          <div class="row-top">
            <span class="line-no">${i + 1}</span>
            ${lyricHtml}
          </div>
          <div class="tags">${tagBtns}</div>
          <div class="memo-wrap">
            <input
              class="memo-input"
              id="memo-${i}"
              type="text"
              placeholder="メモを入力（例: ここでブレス）"
              value="${escAttr(memos[i] || '')}"
              oninput="updateMemo(${i}, this.value)"
            >
          </div>
        </div>
      `;
    }).join('');
  }

  load();
</script>
</body>
</html>
