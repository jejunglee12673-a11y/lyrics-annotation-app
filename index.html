<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歌詞アノテーション</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🎵 歌詞アノテーション</h1>
</header>

<main>
  <div class="card">
    <div class="card-title">歌詞を入力</div>
    <textarea id="lyricsInput" placeholder="ここに歌詞を貼り付けてください&#10;（1行ずつ処理されます）"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="parseLyrics()">セット</button>
      <button class="btn-danger" onclick="clearAll()">クリア</button>
      <span class="save-notice" id="saveNotice"></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">アノテーション</div>
    <div class="annotation-list" id="annotationList">
      <div class="empty-state">歌詞を入力して「セット」を押してください</div>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
