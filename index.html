<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歌詞アノテーション</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🎵 歌詞アノテーション</h1>
  <div class="legend">／=ブレス &nbsp;〰=こぶし &nbsp;↗=しゃくり &nbsp;H=ハモリ &nbsp;〜=ビブラート &nbsp;●=強調 &nbsp;○=弱く &nbsp;⌒=タメ</div>
</header>

<main>
  <div class="card no-print">
    <div class="card-title">曲情報・歌詞を入力</div>
    <input type="text" id="titleInput" class="title-input" placeholder="曲タイトル" oninput="onTitleChange()">
    <textarea id="lyricsInput" placeholder="ここに歌詞を貼り付けてください&#10;（1行ずつ処理されます）"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="parseLyrics()">セット</button>
      <button class="btn-danger" onclick="clearAll()">クリア</button>
      <span class="save-notice" id="saveNotice"></span>
    </div>
  </div>

  <div class="card no-print">
    <div class="card-title">アノテーション</div>
    <div class="annotation-list" id="annotationList">
      <div class="empty-state">歌詞を入力して「セット」を押してください</div>
    </div>
  </div>

  <div class="card" id="cardSection">
    <div class="card-title no-print">歌詞カード（印刷プレビュー）</div>
    <div id="lyricsCard">
      <div class="card-empty">歌詞がありません</div>
    </div>
    <div class="btn-row no-print">
      <button class="btn-print" onclick="window.print()">🖨 印刷</button>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
